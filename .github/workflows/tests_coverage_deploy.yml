name: Test and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
      - 'config/deploy.yml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Ensure validation files exist for tests
      env:
        LINEUP4_VALIDATION_PLAYERS: ${{ secrets.LINEUP4_VALIDATION_PLAYERS }}
      run: |
        mkdir -p backend/games/lineup4
        echo "$LINEUP4_VALIDATION_PLAYERS" | base64 -d > backend/games/lineup4/validation_players.py

    - name: Run tests with coverage
      run: |
        docker compose -f docker-compose.yml -f docker-compose.test.yml build
        docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner \
          pytest --cov=backend --cov-report=xml:backend/coverage.xml --cov-report=term backend/tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: backend/coverage.xml
        flags: backend
        fail_ci_if_error: true

    - name: Cleanup test containers
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.test.yml down --volumes

  # Blocks deploy if production's schema, after the entrypoint pre-start runs,
  # would not match the models being shipped (e.g. a db_models.py change whose
  # backend/migrations/*.sql was forgotten — create_all never ALTERs existing
  # tables, so tests pass but prod breaks at runtime). Prod postgres is a Kamal
  # accessory with no published port, so the schema is dumped over SSH through
  # the running web container — same access pattern as daily_backup.yml.
  schema-drift:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Dump production schema
      run: |
        ssh -o StrictHostKeyChecking=accept-new root@api.agentgames.io '
          set -e
          CONTAINER=$(docker ps -q \
            --filter label=service=agent_games \
            --filter label=role=web \
            --filter status=running | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "No running web container — cannot dump schema" >&2
            exit 1
          fi
          DB_URL=$(docker exec "$CONTAINER" printenv DATABASE_URL | sed "s/+psycopg//")
          docker exec "$CONTAINER" pg_dump --schema-only --no-owner --no-privileges "$DB_URL"
        ' > prod_schema.sql
        grep -q "CREATE TABLE" prod_schema.sql

    - name: Build api image and start scratch postgres
      run: |
        docker compose -f docker-compose.yml build api
        docker compose -f docker-compose.yml up -d --wait postgres

    - name: Restore prod schema into scratch database
      run: |
        docker compose -f docker-compose.yml exec -T postgres createdb -U postgres drift_actual
        docker compose -f docker-compose.yml exec -T postgres createdb -U postgres drift_expected
        docker compose -f docker-compose.yml exec -T postgres psql -q -U postgres -d drift_actual -v ON_ERROR_STOP=1 -f - < prod_schema.sql

    - name: Rehearse pre-start and compare schemas
      run: |
        docker compose -f docker-compose.yml run --rm --no-deps \
          -e ACTUAL_DATABASE_URL=postgresql+psycopg://postgres:local_pw@postgres:5432/drift_actual \
          -e EXPECTED_DATABASE_URL=postgresql+psycopg://postgres:local_pw@postgres:5432/drift_expected \
          api sh backend/check_schema_drift.sh

    - name: Cleanup drift containers
      if: always()
      run: docker compose -f docker-compose.yml down --volumes

  # --- Deploy (only on push to main; requires green tests AND no schema drift) ---
  deploy:
    if: github.event_name == 'push'
    needs: [test, schema-drift]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # The prod image is built here by kamal (COPY . picks these up); without
    # them validation tasks have no reference players at runtime.
    - name: Ensure validation files exist for the image build
      env:
        LINEUP4_VALIDATION_PLAYERS: ${{ secrets.LINEUP4_VALIDATION_PLAYERS }}
      run: |
        mkdir -p backend/games/lineup4
        echo "$LINEUP4_VALIDATION_PLAYERS" | base64 -d > backend/games/lineup4/validation_players.py

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'

    - name: Install Kamal
      run: gem install kamal -v 2.11.0

    - name: Set up SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Write Kamal secrets file
      env:
        KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        INSTITUTION_PASSWORD: ${{ secrets.INSTITUTION_PASSWORD }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        LINEUP4_VALIDATION_PLAYERS: ${{ secrets.LINEUP4_VALIDATION_PLAYERS }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ap-southeast-2
        AWS_S3_BUCKET: agent-games-backups
        SECRET_STRIPE_KEY: ${{ secrets.SECRET_STRIPE_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        STRIPE_PRICE_CLUB_ONCE: ${{ secrets.STRIPE_PRICE_CLUB_ONCE }}
        STRIPE_PRICE_CLUB_YEAR: ${{ secrets.STRIPE_PRICE_CLUB_YEAR }}
        STRIPE_PRICE_UNI_ONCE: ${{ secrets.STRIPE_PRICE_UNI_ONCE }}
        STRIPE_PRICE_UNI_YEAR: ${{ secrets.STRIPE_PRICE_UNI_YEAR }}
        BENCHMARK_TOKEN: ${{ secrets.BENCHMARK_TOKEN }}
      run: |
        mkdir -p .kamal
        cat > .kamal/secrets <<EOF
        KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD
        SECRET_KEY=$SECRET_KEY
        ADMIN_PASSWORD=$ADMIN_PASSWORD
        INSTITUTION_PASSWORD=$INSTITUTION_PASSWORD
        POSTGRES_PASSWORD=$POSTGRES_PASSWORD
        DATABASE_URL=$DATABASE_URL
        LINEUP4_VALIDATION_PLAYERS=$LINEUP4_VALIDATION_PLAYERS
        AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
        AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
        AWS_REGION=$AWS_REGION
        AWS_S3_BUCKET=$AWS_S3_BUCKET
        SECRET_STRIPE_KEY=$SECRET_STRIPE_KEY
        STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
        STRIPE_PRICE_CLUB_ONCE=$STRIPE_PRICE_CLUB_ONCE
        STRIPE_PRICE_CLUB_YEAR=$STRIPE_PRICE_CLUB_YEAR
        STRIPE_PRICE_UNI_ONCE=$STRIPE_PRICE_UNI_ONCE
        STRIPE_PRICE_UNI_YEAR=$STRIPE_PRICE_UNI_YEAR
        BENCHMARK_TOKEN=$BENCHMARK_TOKEN
        EOF

    - name: Deploy with Kamal
      run: kamal deploy

    - name: Release kamal lock if deploy was interrupted
      if: cancelled() || failure()
      run: kamal lock release || true

    - name: Healthcheck
      run: |
        curl -fsS https://api.agentgames.io/health >/dev/null && echo "Healthcheck OK" || (echo "Healthcheck FAILED" && exit 1)
