name: Tests and Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths: ['backend/**', 'pyproject.toml', 'docker-compose.yml', 'docker-compose.test.yml']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Ensure validation files exist for tests
      env:
        LINEUP4_VALIDATION_PLAYERS: ${{ secrets.LINEUP4_VALIDATION_PLAYERS }}
      run: |
        mkdir -p backend/games/lineup4
        echo "$LINEUP4_VALIDATION_PLAYERS" | base64 -d > backend/games/lineup4/validation_players.py

    - name: Run tests with coverage
      run: |
        docker compose -f docker-compose.yml -f docker-compose.test.yml build
        docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner \
          pytest --cov=backend --cov-report=xml:backend/coverage.xml --cov-report=term backend/tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: backend/coverage.xml
        flags: backend
        fail_ci_if_error: true

    - name: Cleanup
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.test.yml down --volumes
