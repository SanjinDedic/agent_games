name: Daily DB Maintenance

on:
  schedule:
    # 20:00 UTC = 06:00 AEST (07:00 during AEDT — GitHub cron is UTC-only)
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Cleanup runs first so the backup captures the cleaned database.
      - name: Clean up old Admin/Demo Institution submissions, then back up
        run: |
          ssh -o StrictHostKeyChecking=accept-new root@api.agentgames.io '
            set -e
            CONTAINER=$(docker ps -q \
              --filter label=service=agent_games \
              --filter label=role=web \
              --filter status=running | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "No running web container — cannot run maintenance" >&2
              exit 1
            fi
            docker exec "$CONTAINER" python -m backend.database.maintenance
            docker exec "$CONTAINER" python -m backend.routes.admin.admin_backup --label DAILY --prune
          '
