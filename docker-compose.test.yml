# Override file for test runs.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm test-runner
# Points all services at the test database so tasks enqueued by tests hit the right data.
services:
  api:
    environment:
      - DB_ENVIRONMENT=test
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000
  worker-validation:
    environment:
      - DB_ENVIRONMENT=test
      # Shorten the validation kill window (soft 2s, hard 3s) so tests that
      # wait out the hard time limit don't idle for the production 5s/6s.
      - VALIDATION_TIMEOUT_SECONDS=2
  worker-simulation:
    environment:
      - DB_ENVIRONMENT=test
  frontend:
    profiles:
      - disabled
