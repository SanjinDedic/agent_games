service: agent_games

image: sanjin/agent_games_api

servers:
  web:
    hosts:
      - api.agentgames.io
    # Secrets live on the web role ONLY — never at the top-level env. Kamal
    # unions a role's secret list with the root's (Env#merge: `secret_keys |
    # other.secret_keys`), so anything under the top-level env.secret would be
    # injected into EVERY role, including worker-validation/worker-simulation,
    # which run untrusted agent code and must hold nothing an attacker can
    # exfiltrate. Keeping the list here means the web app is the only process
    # with credentials; the workers receive only the top-level env.clear.
    env:
      secret:
        - SECRET_KEY
        # Managed Postgres (DigitalOcean), TLS-only:
        #   postgresql+psycopg://agent_games_user:...@<cluster>:25060/agent_games?sslmode=require
        - DATABASE_URL
        - ADMIN_PASSWORD
        - INSTITUTION_PASSWORD
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
        - SECRET_STRIPE_KEY
        - STRIPE_WEBHOOK_SECRET
        - STRIPE_PRICE_CLUB_ONCE
        - STRIPE_PRICE_CLUB_YEAR
        - STRIPE_PRICE_UNI_ONCE
        - STRIPE_PRICE_UNI_YEAR
        # Load-test gate. Set the value in .kamal/secrets only while benchmarking,
        # then clear it and re-push to disable /diagnostics/benchmark-submit.
        - BENCHMARK_TOKEN
    options:
      hostname: api
      memory: 400m
      # Only service allowed real swap: cold gunicorn pages can park on the
      # host's NVMe swapfile instead of OOM-killing a worker mid-request.
      # 1g total = 400m RAM + 600m swap; bounded so a leak still dies.
      memory-swap: 1g
      pids-limit: 50

  worker-validation:
    hosts:
      - api.agentgames.io
    # concurrency=4 on a 1-vCPU host is NOT for CPU parallelism: with
    # max_tasks_per_child=1 a slot is dead from child-exit until billiard
    # respawns it (worst case the 5s pool-maintenance tick), so extra slots
    # exist to keep live children available during respawn gaps. The frozen
    # lean heap makes idle children nearly free (COW-shared).
    # --loglevel=warning: at info, every task logs its full result dict repr
    # (several KB) — measurable CPU on a saturated core. Gossip/mingle/heartbeat
    # are single-host-pointless broker chatter in the MainProcess.
    cmd: "celery -A backend.tasks.celery_app worker -Q validation -n validation@%h --loglevel=warning --without-gossip --without-mingle --without-heartbeat --concurrency=4"
    proxy: false
    options:
      hostname: worker-validation
      memory: 800m
      # memory-swap == memory disables swap: a memory-bomb agent must be
      # OOM-killed at the RAM cap, not thrash in swap past the task time limit.
      # The droplet has a 6G NVMe swapfile, so this guarantee is load-bearing —
      # without it a bomb pages out and outlives the 6s hard kill window.
      memory-swap: 800m
      pids-limit: 50

  worker-simulation:
    hosts:
      - api.agentgames.io
    cmd: "celery -A backend.tasks.celery_app worker -Q simulation -n simulation@%h --loglevel=warning --without-gossip --without-mingle --without-heartbeat --concurrency=2"
    proxy: false
    options:
      hostname: worker-simulation
      # Host budget: the droplet has ~1.9GiB RAM. The old 3g cap exceeded it,
      # so it could never fire — a runaway simulation exhausted the HOST
      # instead, pushing web/valkey into swap and ending in a global OOM kill
      # of an arbitrary victim. 1g is a real in-cgroup limit (~500m per sim at
      # concurrency=2, matching the 500m dev compose container) and leaves
      # room for web + valkey + worker-validation within physical RAM.
      memory: 1g
      # Same no-swap guarantee as worker-validation: untrusted code must hit
      # the RAM cap and die deterministically, not thrash in NVMe swap.
      memory-swap: 1g
      pids-limit: 50

  worker-exercises:
    hosts:
      - api.agentgames.io
    # The exercises queue is served by the standalone Celery app in
    # backend/exercise_worker/tasks.py (dev compose runs it from a slim
    # python+celery image; Kamal roles share the app image, so prod loads the
    # same module from the fat image — backend/__init__.py is empty and the
    # module is stdlib+celery only, so the process is equally lean).
    # Exercises run with ZERO code validation, so like the other workers this
    # role must hold no secrets; prefork (never solo — solo ignores time
    # limits) with two slots and a 0.5s soft / 1.5s hard per-task budget.
    cmd: "celery -A backend.exercise_worker.tasks worker -Q exercises -n exercises@%h --loglevel=warning --without-gossip --without-mingle --without-heartbeat --concurrency=2"
    proxy: false
    options:
      hostname: worker-exercises
      # Same measured budget as the dev compose service (see its comment).
      memory: 160m
      # Same no-swap guarantee as the other workers: a memory-bomb submission
      # must be OOM-killed at the cap, not thrash in swap past the hard kill.
      memory-swap: 160m
      pids-limit: 50

deploy_timeout: 120

proxy:
  ssl: true
  hosts:
    - api.agentgames.io
  app_port: 8000
  response_timeout: 300
  healthcheck:
    path: /health
    interval: 10
    timeout: 30

registry:
  server: registry.digitalocean.com
  username: doctr
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: backend/Dockerfile
  context: .
  args:
    RUNTIME_PACKAGES: postgresql18-client

env:
  clear:
    # 1-vCPU host: 3 async workers just triple the memory footprint (the
    # 300m/3-worker combo OOM-crash-looped gunicorn and pinned the core).
    GUNICORN_WORKERS: "2"
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: /agent_games
    CELERY_BROKER_URL: redis://valkey:6379/0
    DB_ENVIRONMENT: production
    # SQLAlchemy pool bounds per process. The managed cluster's smallest plan
    # caps total client connections (~22), shared by both gunicorn web workers
    # and every forked Celery child, so keep each process's pool small: 3+2=5
    # max. Unset outside prod (dev/test keep SQLAlchemy's defaults). See
    # backend/database/db_session.py.
    DB_POOL_SIZE: "3"
    DB_MAX_OVERFLOW: "2"
    AWS_REGION: ap-southeast-2
    AWS_S3_BUCKET: agent-games-backups
    AWS_S3_ASSETS_BUCKET: agent-games-assets
    FRONTEND_URL: https://agentgames.io
  # NOTE: no top-level `secret:` block by design. Kamal unions each role's
  # secret list with the root's, so a secret listed here would reach the
  # worker roles too. All secrets are declared under servers.web.env.secret
  # instead, keeping the credential-free workers credential-free.

accessories:
  # Celery broker + result backend. Ephemeral: no persistence dirs on purpose.
  # Must be booted before the first deploy of the Celery setup:
  #   kamal accessory boot valkey
  valkey:
    image: valkey/valkey:latest
    hosts:
      - api.agentgames.io
    cmd: "valkey-server --save '' --appendonly no --maxmemory 300mb --maxmemory-policy noeviction"
    options:
      hostname: valkey
      memory: 400m
      # The broker must never touch swap: a paged-out broker stalls every
      # task dispatch and result poll on the platform (slow-motion outage).
      # Valkey is ephemeral by design, so a fast OOM restart is the better
      # failure. maxmemory 300mb + client/overhead headroom fits in 400m.
      memory-swap: 400m

  # Postgres is NOT an accessory: production runs on a DigitalOcean managed
  # cluster, reached over TLS via DATABASE_URL (sslmode=require). Nothing on
  # this host stores data. Local dev still uses the postgres container in
  # docker-compose.yml.

aliases:
  shell: app exec --interactive --reuse "sh"
  logs: app logs --tail 100 --follow
  health: app exec --reuse "curl -f http://localhost:8000/health"
  # psql wants a libpq URL; the app's DATABASE_URL carries the SQLAlchemy
  # "+psycopg" driver suffix (same strip as backend/entrypoint.sh).
  db: app exec --interactive --reuse "sh -c 'psql \"$(printf %s \"$DATABASE_URL\" | sed s/+psycopg//)\"'"
