service: agent_games

image: sanjin/agent_games_api

servers:
  web:
    hosts:
      - api.agentgames.io
    options:
      hostname: api
      memory: 400m
      pids-limit: 50

  validator:
    hosts:
      - api.agentgames.io
    cmd: "python /agent_games/backend/docker_utils/services/validation_server.py"
    proxy: false
    options:
      hostname: validator
      memory: 600m
      pids-limit: 50

  simulator:
    hosts:
      - api.agentgames.io
    cmd: "python /agent_games/backend/docker_utils/services/simulation_server.py"
    proxy: false
    options:
      hostname: simulator
      memory: 3g
      pids-limit: 50

deploy_timeout: 120

proxy:
  ssl: true
  hosts:
    - api.agentgames.io
  app_port: 8000
  response_timeout: 300
  healthcheck:
    path: /health
    interval: 10
    timeout: 30

registry:
  server: registry.digitalocean.com
  username: doctr
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: backend/docker_utils/Dockerfile
  context: .
  args:
    RUNTIME_PACKAGES: postgresql18-client

env:
  clear:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: /agent_games
    VALIDATOR_URL: http://validator:8001
    SIMULATOR_URL: http://simulator:8002
    DB_ENVIRONMENT: production
    AWS_REGION: ap-southeast-2
    AWS_S3_BUCKET: agent-games-backups
    AWS_S3_ASSETS_BUCKET: agent-games-assets
    FRONTEND_URL: https://agentgames.io
  secret:
    - SECRET_KEY
    - DATABASE_URL
    - ADMIN_PASSWORD
    - INSTITUTION_PASSWORD
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - SECRET_STRIPE_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRICE_CLUB_ONCE
    - STRIPE_PRICE_CLUB_YEAR
    - STRIPE_PRICE_UNI_ONCE
    - STRIPE_PRICE_UNI_YEAR

accessories:
  postgres:
    image: postgres:14
    hosts:
      - api.agentgames.io
    options:
      hostname: postgres
      memory: 700m
      shm-size: 256m
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: agent_games
        PGDATA: /var/lib/postgresql/data/pgdata
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

aliases:
  shell: app exec --interactive --reuse "sh"
  logs: app logs --tail 100 --follow
  health: app exec --reuse "curl -f http://localhost:8000/health"
  db: accessory exec --interactive postgres "psql -U postgres -d agent_games"
