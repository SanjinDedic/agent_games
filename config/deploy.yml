service: agent_games

image: sanjin/agent_games_api

servers:
  web:
    hosts:
      - api.agentgames.io
    options:
      hostname: api
      memory: 400m
      pids-limit: 50

  worker-validation:
    hosts:
      - api.agentgames.io
    cmd: "celery -A backend.celery_app worker -Q validation -n validation@%h --loglevel=info --concurrency=4"
    proxy: false
    options:
      hostname: worker-validation
      memory: 600m
      pids-limit: 50

  worker-simulation:
    hosts:
      - api.agentgames.io
    cmd: "celery -A backend.celery_app worker -Q simulation -n simulation@%h --loglevel=info --concurrency=2"
    proxy: false
    options:
      hostname: worker-simulation
      memory: 3g
      pids-limit: 50

deploy_timeout: 120

proxy:
  ssl: true
  hosts:
    - api.agentgames.io
  app_port: 8000
  response_timeout: 300
  healthcheck:
    path: /health
    interval: 10
    timeout: 30

registry:
  server: registry.digitalocean.com
  username: doctr
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  dockerfile: backend/Dockerfile
  context: .
  args:
    RUNTIME_PACKAGES: postgresql18-client

env:
  clear:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: /agent_games
    CELERY_BROKER_URL: redis://valkey:6379/0
    DB_ENVIRONMENT: production
    AWS_REGION: ap-southeast-2
    AWS_S3_BUCKET: agent-games-backups
    AWS_S3_ASSETS_BUCKET: agent-games-assets
    FRONTEND_URL: https://agentgames.io
  secret:
    - SECRET_KEY
    - DATABASE_URL
    - ADMIN_PASSWORD
    - INSTITUTION_PASSWORD
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - SECRET_STRIPE_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRICE_CLUB_ONCE
    - STRIPE_PRICE_CLUB_YEAR
    - STRIPE_PRICE_UNI_ONCE
    - STRIPE_PRICE_UNI_YEAR
    # Load-test gate. Set the value in .kamal/secrets only while benchmarking,
    # then clear it and re-push to disable /diagnostics/benchmark-submit.
    - BENCHMARK_TOKEN

accessories:
  # Celery broker + result backend. Ephemeral: no persistence dirs on purpose.
  # Must be booted before the first deploy of the Celery setup:
  #   kamal accessory boot valkey
  valkey:
    image: valkey/valkey:latest
    hosts:
      - api.agentgames.io
    cmd: "valkey-server --save '' --appendonly no --maxmemory 300mb --maxmemory-policy noeviction"
    options:
      hostname: valkey
      memory: 400m

  postgres:
    image: postgres:18
    hosts:
      - api.agentgames.io
    options:
      hostname: postgres
      memory: 700m
      shm-size: 256m
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: agent_games
        PGDATA: /var/lib/postgresql/data/pgdata
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

aliases:
  shell: app exec --interactive --reuse "sh"
  logs: app logs --tail 100 --follow
  health: app exec --reuse "curl -f http://localhost:8000/health"
  db: accessory exec --interactive postgres "psql -U postgres -d agent_games"
