services:
  api:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
      args:
        - RUNTIME_PACKAGES=postgresql18-client
    # Dev: single-worker uvicorn with hot reload. Production uses the Dockerfile CMD (gunicorn).
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - VALIDATOR_URL=http://validator:8001
      - SIMULATOR_URL=http://simulator:8002
      - SECRET_KEY=${SECRET_KEY:-test_secret_key_for_tests}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://postgres:local_pw@postgres:5432/agent_games}
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
    env_file:
      - path: .aws.env
        required: false
    depends_on:
      validator:
        condition: service_healthy
      simulator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/agent_games/backend
    mem_limit: 400m
    mem_reservation: 200m
    pids_limit: 50

  validator:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
    command: python /agent_games/backend/docker_utils/services/validation_server.py
    ports:
      - "8001:8001"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-test_secret_key_for_tests}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://postgres:local_pw@postgres:5432/agent_games}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend:/agent_games/backend
    mem_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  simulator:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
    command: python /agent_games/backend/docker_utils/services/simulation_server.py
    ports:
      - "8002:8002"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-test_secret_key_for_tests}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://postgres:local_pw@postgres:5432/agent_games}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 250m

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_pw}
      POSTGRES_DB: agent_games
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_games"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 700m
    mem_reservation: 300m

  # Test runner — not started by `docker compose up`, only via `docker compose run`
  test-runner:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
      args:
        - BUILD_ENV=test
        - RUNTIME_PACKAGES=docker-cli
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=test
      - SECRET_KEY=test_secret_key_for_tests
    depends_on:
      api:
        condition: service_healthy
      validator:
        condition: service_healthy
      simulator:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/agent_games/backend
      - /var/run/docker.sock:/var/run/docker.sock
    scale: 0

volumes:
  postgres_data:
