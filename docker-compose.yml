services:
  api:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
      args:
        - RUNTIME_PACKAGES=postgresql18-client
    # Dev: single-worker uvicorn with hot reload. Production uses the Dockerfile CMD (gunicorn).
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    # Non-secret config only. Mirrors config/deploy.yml env.clear.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - VALIDATOR_URL=http://validator:8001
      - SIMULATOR_URL=http://simulator:8002
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_PUBLIC_ENDPOINT_URL=${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
    # Secrets. .env holds dev defaults (committed); .aws.env is an optional override
    # for devs exercising real S3 (gitignored). Listed second so its values win.
    env_file:
      - path: .env
        required: true
      - path: .aws.env
        required: false
    depends_on:
      validator:
        condition: service_healthy
      simulator:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/agent_games/backend
      - ./frontend/public:/agent_games/frontend/public:ro
    mem_limit: 400m
    mem_reservation: 200m
    pids_limit: 50

  validator:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
    command: python /agent_games/backend/docker_utils/services/validation_server.py
    ports:
      - "8001:8001"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend:/agent_games/backend
    mem_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  simulator:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
    command: python /agent_games/backend/docker_utils/services/simulation_server.py
    ports:
      - "8002:8002"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_ASSETS_URL=${VITE_ASSETS_URL:-https://agent-games-assets.s3.ap-southeast-2.amazonaws.com}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 250m

  minio:
    image: minio/minio:latest
    entrypoint: /bin/sh
    command: >
      -c "mkdir -p /data/${AWS_S3_ASSETS_BUCKET:-agent-games-assets}/support/institution
      /data/${AWS_S3_ASSETS_BUCKET:-agent-games-assets}/support/user &&
      exec minio server /data --console-address ':9001'"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} >/dev/null 2>&1 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 500m
    mem_reservation: 150m

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: agent_games
    env_file:
      - path: .env
        required: true
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_games"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 700m
    mem_reservation: 300m

  # Test runner — not started by `docker compose up`, only via `docker compose run`
  test-runner:
    build:
      context: .
      dockerfile: ./backend/docker_utils/Dockerfile
      args:
        - BUILD_ENV=test
        - RUNTIME_PACKAGES=docker-cli
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - DB_ENVIRONMENT=test
      - SECRET_KEY=test_secret_key_for_tests
    depends_on:
      api:
        condition: service_healthy
      validator:
        condition: service_healthy
      simulator:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/agent_games/backend
      - /var/run/docker.sock:/var/run/docker.sock
    command: pytest backend/tests/ -v
    scale: 0

volumes:
  postgres_data:
  minio_data:
