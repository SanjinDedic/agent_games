services:
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        - RUNTIME_PACKAGES=postgresql18-client
    # Dev: single-worker uvicorn with hot reload. Production uses the Dockerfile CMD (gunicorn).
    # backend/entrypoint.sh runs the one-shot pre-start (init_db + SQL migrations,
    # idempotent, never run from the app lifespan) then execs the server passed to it.
    # docker-compose.test.yml overrides this to run uvicorn directly (no entrypoint) —
    # the test suite owns the test schema.
    command: sh backend/entrypoint.sh uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    # Non-secret config only. Mirrors config/deploy.yml env.clear.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_PUBLIC_ENDPOINT_URL=${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      # Load-test gate. Empty by default -> /diagnostics/benchmark-submit is
      # disabled. Set BENCHMARK_TOKEN in the env before `docker compose up` to
      # enable it for a benchmark run. In prod this comes from deploy secrets.
      - BENCHMARK_TOKEN=${BENCHMARK_TOKEN:-}
    # Secrets. .env holds dev defaults (committed); .aws.env is an optional override
    # for devs exercising real S3 (gitignored). Listed second so its values win.
    env_file:
      - path: .env
        required: true
      - path: .aws.env
        required: false
    depends_on:
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/agent_games/backend
      - ./frontend/public:/agent_games/frontend/public:ro
    mem_limit: 400m
    mem_reservation: 200m
    pids_limit: 50

  # Celery broker + result backend. Ephemeral by design: losing in-flight
  # tasks on restart matches losing in-flight HTTP requests in the old setup.
  # noeviction is mandatory for a broker.
  valkey:
    image: valkey/valkey:latest
    command: valkey-server --save '' --appendonly no --maxmemory 150mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    mem_limit: 200m

  worker-validation:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q validation -n validation@%h --loglevel=info --concurrency=4
    # No env_file / secrets by design: this worker runs untrusted agent code and
    # must hold NOTHING an attacker could exfiltrate. Validation/exercise tasks
    # build an in-memory League and never open a DB or S3 connection — a breached
    # worker leaks no SECRET_KEY, DB password, or AWS key because none is present.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d validation@$$HOSTNAME -t 10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - ./backend:/agent_games/backend
    mem_limit: 500m
    # memswap_limit == mem_limit disables swap for the container. Without it,
    # docker grants an equal amount of swap on hosts that have any (GitHub
    # Actions runners carry a 4GB swapfile), and a memory-bomb agent thrashes
    # in swap past the 6s hard task time limit instead of being OOM-killed —
    # the resilience tests require the kernel OOM kill to be deterministic.
    memswap_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  worker-simulation:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q simulation -n simulation@%h --loglevel=info --concurrency=1
    # No env_file / secrets by design: this worker runs untrusted agent code and
    # must hold NOTHING an attacker could exfiltrate. Submissions arrive as a task
    # arg (the API reads them from the DB before enqueue), so the worker opens no
    # DB connection and needs no DATABASE_URL, SECRET_KEY, or AWS key.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - DB_ENVIRONMENT=${DB_ENVIRONMENT:-production}
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d simulation@$$HOSTNAME -t 10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - ./backend:/agent_games/backend
    mem_limit: 500m
    # Same no-swap guarantee as worker-validation: untrusted code must hit the
    # RAM cap and die, not spill into host swap.
    memswap_limit: 500m
    mem_reservation: 200m
    pids_limit: 50

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_ASSETS_URL=${VITE_ASSETS_URL:-https://agent-games-assets.s3.ap-southeast-2.amazonaws.com}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 250m

  minio:
    image: minio/minio:latest
    entrypoint: /bin/sh
    command: >
      -c "mkdir -p /data/${AWS_S3_ASSETS_BUCKET:-agent-games-assets}/support/institution
      /data/${AWS_S3_ASSETS_BUCKET:-agent-games-assets}/support/user &&
      exec minio server /data --console-address ':9001'"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} >/dev/null 2>&1 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 500m
    mem_reservation: 150m

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: agent_games
    env_file:
      - path: .env
        required: true
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_games"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 700m
    mem_reservation: 300m

  # Test runner — not started by `docker compose up`, only via `docker compose run`
  test-runner:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        - BUILD_ENV=test
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/agent_games
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - DB_ENVIRONMENT=test
      - SECRET_KEY=test_secret_key_for_tests
      # Cheap bcrypt for runtime hashing in tests (route-created users, demo
      # users). Precomputed conftest hashes are cost 4 to match.
      - BCRYPT_ROUNDS=4
      # Must match worker-validation's value in docker-compose.test.yml: the
      # ENQUEUING process stamps soft/hard time limits into each task message
      # (they override the worker-side task defaults), and tests enqueue from
      # this container.
      - VALIDATION_TIMEOUT_SECONDS=2
    depends_on:
      api:
        condition: service_healthy
      valkey:
        condition: service_healthy
      worker-validation:
        condition: service_healthy
      worker-simulation:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/agent_games/backend
    command: pytest backend/tests/ -v
    scale: 0

volumes:
  postgres_data:
  minio_data:
